{% extends 'base/base.html' %}

{% block content %}
<div class="flex items-center justify-between mb-4">
  <h2 class="text-lg font-semibold text-gray-900">Tòa nhà</h2>
  {% if user.profile.role == 'ADMIN' %}
  <a href="{% url 'building_create' %}" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium">Thêm tòa nhà</a>
  {% endif %}
</div>

<div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
  {% for b in page_obj %}
  <a href="{% url 'building_detail' b.pk %}" class="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden hover:border-blue-200">
    {% if b.image %}
    <img src="{{ b.image.url }}" alt="" class="w-full h-40 object-cover">
    {% endif %}
    <div class="p-6">
    <p class="font-semibold text-gray-900">{{ b.name }}</p>
    <p class="text-sm text-gray-500 mt-1">{{ b.address }}</p>
    <p class="text-xs text-gray-400 mt-3">Căn hộ: {{ b.apt_count }}</p>
    </div>
  </a>
  {% empty %}
  <p class="text-sm text-gray-400">Không có dữ liệu</p>
  {% endfor %}
</div>
{% endblock %}
