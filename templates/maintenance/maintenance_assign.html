{% extends 'base/base.html' %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-2xl">
  <h2 class="text-lg font-semibold text-gray-900 mb-4">Phân công nhân viên</h2>
  <p class="text-sm text-gray-600 mb-4">{{ item.title }} — {{ item.apartment.apartment_number }}</p>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Nhân viên</label>{{ form.assigned_to }}</div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Ưu tiên</label>{{ form.priority }}</div>
    <div class="flex gap-2">
      <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium">Lưu</button>
      <a href="{% url 'maintenance_detail' item.pk %}" class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium">Hủy</a>
    </div>
  </form>
</div>
{% endblock %}
