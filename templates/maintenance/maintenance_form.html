{% extends 'base/base.html' %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-3xl">
  <h2 class="text-lg font-semibold text-gray-900 mb-4">Tạo yêu cầu bảo trì</h2>
  <form method="post" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Cư dân</label>{{ form.resident }}</div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Căn hộ</label>{{ form.apartment }}</div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Danh mục</label>{{ form.category }}</div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Ưu tiên</label>{{ form.priority }}</div>
    </div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Tiêu đề</label>{{ form.title }}</div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Mô tả</label>{{ form.description }}</div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Ảnh</label>{{ form.image }}</div>
    <div class="flex gap-2">
      <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium">Tạo</button>
      <a href="{% url 'maintenance_list' %}" class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium">Hủy</a>
    </div>
  </form>
</div>
{% endblock %}
