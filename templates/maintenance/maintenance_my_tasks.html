{% extends 'base/base.html' %}
{% load ui_extras %}

{% block content %}
<h2 class="text-lg font-semibold text-gray-900 mb-4">Việc của tôi</h2>
<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Tiêu đề</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Căn</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Trạng thái</th>
          <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Thao tác</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-100">
        {% for m in page_obj %}
        <tr>
          <td class="px-6 py-4 text-sm">{{ m.title }}</td>
          <td class="px-6 py-4 text-sm">{{ m.apartment.apartment_number }}</td>
          <td class="px-6 py-4 text-sm"><span class="ui-badge {{ m.status|badge_class }}">{{ m.get_status_display }}</span></td>
          <td class="px-6 py-4 text-sm text-right">
            <a class="px-2 py-1 rounded bg-gray-100" href="{% url 'maintenance_update_status' m.pk %}">Cập nhật</a>
          </td>
        </tr>
        {% empty %}
        <tr><td class="px-6 py-8 text-center text-sm text-gray-400" colspan="4">Không có dữ liệu</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
