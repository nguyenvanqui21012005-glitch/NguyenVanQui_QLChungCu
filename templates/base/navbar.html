<header class="bg-white border-b border-gray-200 px-6 py-3 flex items-center justify-between flex-shrink-0">
  <div class="flex items-center gap-2">
    <button id="sidebar-toggle" class="text-gray-500 hover:text-gray-700 lg:hidden">
      <i class="fa-solid fa-bars text-xl"></i>
    </button>
    <nav class="flex items-center text-sm" aria-label="breadcrumb">
      {% block breadcrumb %}
      <span class="text-gray-500">Dashboard</span>
      {% endblock %}
    </nav>
  </div>

  <div class="flex items-center gap-3">
    <div class="relative">
      <a href="{% url 'profile' %}" class="flex items-center gap-2 pl-3 border-l border-gray-200 hover:text-blue-600 transition-colors">
        {% if user.profile.avatar %}
        <img src="{{ user.profile.avatar.url }}" class="w-8 h-8 rounded-full object-cover" alt="">
        {% else %}
        <div class="w-8 h-8 rounded-full bg-blue-600 flex items-center justify-center text-white text-xs font-bold">
          {{ user.first_name.0 }}{{ user.last_name.0 }}
        </div>
        {% endif %}
        <span class="text-sm font-medium text-gray-700 hidden sm:block">{{ user.get_full_name }}</span>
        <i class="fa-solid fa-chevron-down text-xs text-gray-400"></i>
      </a>
    </div>

    <form method="post" action="{% url 'logout' %}">
      {% csrf_token %}
      <button type="submit" class="flex items-center gap-1.5 text-sm text-gray-500 hover:text-red-600 transition-colors px-2 py-1.5 rounded-lg hover:bg-red-50">
        <i class="fa-solid fa-right-from-bracket"></i>
        <span class="hidden sm:block">Đăng xuất</span>
      </button>
    </form>
  </div>
</header>
