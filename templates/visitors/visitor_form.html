{% extends 'base/base.html' %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-2xl">
  <h2 class="text-lg font-semibold text-gray-900 mb-4">Đăng ký khách thăm</h2>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Họ tên</label>{{ form.full_name }}</div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">CCCD</label>{{ form.id_number }}</div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">SĐT</label>{{ form.phone }}</div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Căn hộ</label>{{ form.visit_apartment }}</div>
    </div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Cư dân (nếu có)</label>{{ form.resident }}</div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Mục đích</label>{{ form.purpose }}</div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú</label>{{ form.note }}</div>
    <div class="flex gap-2">
      <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium">Lưu</button>
      <a href="{% url 'visitor_today' %}" class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium">Hủy</a>
    </div>
  </form>
</div>
{% endblock %}
