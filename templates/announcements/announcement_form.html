{% extends 'base/base.html' %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-3xl">
  <h2 class="text-lg font-semibold text-gray-900 mb-4">{% if mode == 'edit' %}Sửa thông báo{% else %}Tạo thông báo{% endif %}</h2>
  <form method="post" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Tiêu đề</label>{{ form.title }}</div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Danh mục</label>{{ form.category }}</div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Nội dung</label>{{ form.content }}</div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Ảnh</label>{{ form.image }}</div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">File</label>{{ form.attachment }}</div>
    </div>
    <label class="inline-flex items-center gap-2 text-sm">{{ form.is_pinned }} Ghim</label>
    <div class="flex gap-2">
      <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium">Lưu</button>
      <a href="{% url 'announcement_list' %}" class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium">Hủy</a>
    </div>
  </form>
</div>
{% endblock %}
