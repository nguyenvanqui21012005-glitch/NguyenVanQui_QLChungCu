{% extends 'base/base.html' %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-3xl">
  <h2 class="text-lg font-semibold text-gray-900 mb-4">Tạo hóa đơn</h2>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Loại phí</label>{{ form.fee_type }}</div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Căn hộ</label>{{ form.apartment }}</div>
    </div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Cư dân</label>{{ form.resident }}</div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Tháng</label>{{ form.month }}</div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Năm</label>{{ form.year }}</div>
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Số tiền</label>{{ form.amount }}</div>
      <div><label class="block text-sm font-medium text-gray-700 mb-1">Hạn</label>{{ form.due_date }}</div>
    </div>
    <div><label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú</label>{{ form.note }}</div>
    <div class="flex gap-2">
      <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium">Tạo</button>
      <a href="{% url 'invoice_list' %}" class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium">Hủy</a>
    </div>
  </form>
</div>
{% endblock %}
