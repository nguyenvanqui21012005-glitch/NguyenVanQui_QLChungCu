{% extends 'base/base.html' %}

{% block content %}
<div class="flex items-center justify-between mb-4">
  <h2 class="text-lg font-semibold text-gray-900">Loại phí</h2>
  <a href="{% url 'fee_type_create' %}" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium">Thêm loại phí</a>
</div>

<div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
  <div class="overflow-x-auto">
    <table class="min-w-full divide-y divide-gray-200">
      <thead class="bg-gray-50">
        <tr>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Tên</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Đơn vị</th>
          <th class="px-6 py-3 text-left text-xs font-semibold text-gray-500 uppercase">Đơn giá</th>
          <th class="px-6 py-3 text-right text-xs font-semibold text-gray-500 uppercase">Thao tác</th>
        </tr>
      </thead>
      <tbody class="bg-white divide-y divide-gray-100">
        {% for ft in fee_types %}
        <tr>
          <td class="px-6 py-4 text-sm">{{ ft.name }}</td>
          <td class="px-6 py-4 text-sm">{{ ft.get_unit_display }}</td>
          <td class="px-6 py-4 text-sm">{{ ft.unit_price }}</td>
          <td class="px-6 py-4 text-sm text-right">
            <a href="{% url 'fee_type_edit' ft.pk %}" class="px-2 py-1 rounded bg-gray-100">Sửa</a>
          </td>
        </tr>
        {% empty %}
        <tr><td class="px-6 py-8 text-center text-sm text-gray-400" colspan="4">Không có dữ liệu</td></tr>
        {% endfor %}
      </tbody>
    </table>
  </div>
</div>
{% endblock %}
