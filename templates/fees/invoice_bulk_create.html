{% extends 'base/base.html' %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-2xl">
  <h2 class="text-lg font-semibold text-gray-900 mb-4">Tạo hóa đơn hàng loạt</h2>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tháng</label>
        <input name="month" type="number" value="{{ today.month }}" class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm">
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Năm</label>
        <input name="year" type="number" value="{{ today.year }}" class="w-full border border-gray-300 rounded-xl px-3 py-2.5 text-sm">
      </div>
    </div>

    <div>
      <label class="block text-sm font-medium text-gray-700 mb-2">Chọn loại phí</label>
      <div class="space-y-2">
        {% for ft in fee_types %}
        <label class="flex items-center gap-2 text-sm">
          <input type="checkbox" name="fee_types" value="{{ ft.pk }}" checked>
          <span>{{ ft.name }}</span>
        </label>
        {% empty %}
        <p class="text-sm text-gray-400">Chưa có loại phí</p>
        {% endfor %}
      </div>
    </div>

    <div class="flex gap-2">
      <button type="submit" class="px-4 py-2 rounded-lg bg-blue-600 hover:bg-blue-700 text-white text-sm font-medium">Tạo</button>
      <a href="{% url 'invoice_list' %}" class="px-4 py-2 rounded-lg bg-gray-100 hover:bg-gray-200 text-gray-700 text-sm font-medium">Hủy</a>
    </div>
  </form>
</div>
{% endblock %}
