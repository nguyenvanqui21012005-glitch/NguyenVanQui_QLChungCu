{% extends 'base/base.html' %}

{% block auth_content %}
<div class="min-h-screen bg-gradient-to-br from-slate-800 to-blue-900 flex items-center justify-center p-4">
  <div class="w-full max-w-md">
    <div class="text-center mb-8">
      <div class="inline-flex items-center justify-center w-16 h-16 bg-blue-600 rounded-2xl shadow-lg mb-4">
        <i class="fa-solid fa-building text-white text-3xl"></i>
      </div>
      <h1 class="text-3xl font-bold text-white">ApartmentMS</h1>
      <p class="text-blue-200 mt-1 text-sm">Hệ thống quản lý chung cư</p>
    </div>

    <div class="bg-white rounded-2xl shadow-2xl p-8">
      <h2 class="text-xl font-semibold text-gray-900 mb-6 text-center">Đăng nhập</h2>

      {% if form.errors %}
      <div class="bg-red-50 border border-red-200 rounded-xl p-4 mb-6 flex items-center gap-3">
        <i class="fa-solid fa-circle-xmark text-red-500"></i>
        <p class="text-sm text-red-700">Tên đăng nhập hoặc mật khẩu không đúng.</p>
      </div>
      {% endif %}

      <form method="post" class="space-y-5">
        {% csrf_token %}
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Tên đăng nhập</label>
          <div class="relative">
            <i class="fa-solid fa-user absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" name="username" class="ui-input pl-10 pr-4" placeholder="Nhập tên đăng nhập" autofocus required>
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1.5">Mật khẩu</label>
          <div class="relative">
            <i class="fa-solid fa-lock absolute left-3.5 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" name="password" id="password-input" class="ui-input pl-10 pr-12" placeholder="Nhập mật khẩu" required>
            <button type="button" onclick="togglePassword()" class="absolute right-3.5 top-1/2 -translate-y-1/2 text-gray-400 hover:text-gray-600">
              <i class="fa-solid fa-eye" id="eye-icon"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="ui-btn ui-btn-primary w-full">
          <i class="fa-solid fa-right-to-bracket mr-2"></i>
          Đăng nhập
        </button>
      </form>
    </div>

    <p class="text-center text-blue-200 text-xs mt-6">© 2025 ApartmentMS</p>
  </div>
</div>

<script>
function togglePassword() {
  const input = document.getElementById('password-input');
  const icon = document.getElementById('eye-icon');
  if (input.type === 'password') {
    input.type = 'text';
    icon.className = 'fa-solid fa-eye-slash';
  } else {
    input.type = 'password';
    icon.className = 'fa-solid fa-eye';
  }
}
</script>
{% endblock %}
