{% extends 'base/base.html' %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-xl">
  <h2 class="text-lg font-semibold text-gray-900 mb-4">Đổi mật khẩu</h2>
  <form method="post" class="space-y-4">
    {% csrf_token %}
    {{ form.non_field_errors }}
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ form.old_password.label }}</label>
      {{ form.old_password }}
      {{ form.old_password.errors }}
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ form.new_password1.label }}</label>
      {{ form.new_password1 }}
      {{ form.new_password1.errors }}
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">{{ form.new_password2.label }}</label>
      {{ form.new_password2 }}
      {{ form.new_password2.errors }}
    </div>
    <div class="flex gap-2">
      <button type="submit" class="ui-btn ui-btn-primary">Đổi mật khẩu</button>
      <a href="{% url 'profile' %}" class="ui-btn ui-btn-secondary">Hủy</a>
    </div>
  </form>
</div>
{% endblock %}
