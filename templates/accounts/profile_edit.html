{% extends 'base/base.html' %}

{% block content %}
<div class="bg-white rounded-xl shadow-sm border border-gray-100 p-6 max-w-2xl">
  <h2 class="text-lg font-semibold text-gray-900 mb-4">Cập nhật hồ sơ</h2>
  <form method="post" enctype="multipart/form-data" class="space-y-4">
    {% csrf_token %}
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Họ</label>
        {{ form.last_name }}
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Tên</label>
        {{ form.first_name }}
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
      {{ form.email }}
    </div>
    <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Số điện thoại</label>
        {{ form.phone }}
      </div>
      <div>
        <label class="block text-sm font-medium text-gray-700 mb-1">Ngày sinh</label>
        {{ form.date_of_birth }}
      </div>
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Giới tính</label>
      {{ form.gender }}
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Địa chỉ</label>
      {{ form.address }}
    </div>
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Ghi chú</label>
      {{ form.note }}
    </div>
    <div class="flex gap-2">
      <button type="submit" class="ui-btn ui-btn-primary">Lưu</button>
      <a href="{% url 'profile' %}" class="ui-btn ui-btn-secondary">Hủy</a>
    </div>
  </form>
</div>
{% endblock %}
